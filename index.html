<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; color: #172033; }
    header { background: #111827; color: white; padding: 18px 6%; display: flex; justify-content: space-between; align-items: center; }
    header a { color: #a5b4fc; text-decoration: none; }
    .hero { padding: 25px 6%; background: white; border-bottom: 1px solid #e5e7eb; }
    .wrap { padding: 25px 6%; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 15px; }
    .card { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: bold; font-size: 14px; }
    footer { text-align: center; padding: 20px; color: #6b7280; font-size: 14px; }
    
    /* Sohbet Butonu */
    .chat-btn {
      position: fixed; bottom: 20px; right: 20px;
      background-color: #007bff; color: white;
      padding: 12px 18px; border-radius: 30px; font-size: 16px;
      cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1000;
    }

    /* Sohbet Penceresi */
    .chat-box {
      display: none; position: fixed; bottom: 75px; right: 20px;
      width: 280px; background: white; border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 1001; overflow: hidden;
    }
    .chat-header { background: #007bff; color: white; padding: 12px 15px; display: flex; justify-content: space-between; font-weight: bold; }
    .chat-header button { background: none; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
    .chat-body { padding: 15px; height: 100px; font-size: 14px; background: #fafafa; }
    .msg { background: #e9ecef; padding: 8px 12px; border-radius: 8px; margin: 0; display: inline-block; }
    .chat-footer { display: flex; border-top: 1px solid #eee; padding: 8px; }
    .chat-footer input { flex: 1; border: 1px solid #ddd; padding: 6px 10px; border-radius: 6px; outline: none; }
    .chat-footer button { background: #007bff; color: white; border: none; padding: 6px 12px; margin-left: 5px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

  <header>
    <b class="logo">HizmetBul</b>
    <a href="admin.html">Yönetim Paneli</a>
  </header>

  <section class="hero">
    <h1>İhtiyacın Olan Hizmeti Tek Yerde Bul</h1>
    <p>Hizmet verenleri kategori ve ilçeye göre bul.</p>
  </section>

  <main class="wrap">
    <h2>Hizmet Kategorileri</h2>
    <div class="grid" id="grid"></div>
  </main>

  <footer>© 2026 HizmetBul</footer>

  <!-- Sohbet Butonu -->
  <div class="chat-btn" onclick="toggleChat()">💬 Sohbet Et</div>

  <!-- Açılır Sohbet Penceresi -->
  <div id="chatBox" class="chat-box">
    <div class="chat-header">
      <span>Canlı Destek</span>
      <button onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-body">
      <p class="msg">Merhaba! Nasıl yardımcı olabiliriz?</p>
    </div>
    <div class="chat-footer">
      <input type="text" placeholder="Mesaj yazın..." />
      <button onclick="alert('Mesajınız alındı!')">Gönder</button>
    </div>
  </div>

  <script>
    // Kategorileri Listeletme
    const cats = [["🚗","Oto Çekici & Yol Yardım"],["🧹","Ev Temizliği"],["❄️","Klima Servisi"],["📚","Özel Ders"],["🛠️","Tadilat"]];
    const grid = document.getElementById("grid");
    
    cats.forEach(c => {
      grid.innerHTML += `<div class="card"><span style="font-size:24px;">${c[0]}</span><br>${c[1]}</div>`;
    });

    // Sohbet Kutusunu Aç/Kapat
    function toggleChat() {
      const box = document.getElementById('chatBox');
      box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }
  </script>

</body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yönetim Paneli</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; color: #172033; }
    header { background: #111827; color: white; padding: 18px 6%; display: flex; justify-content: space-between; align-items: center; }
    header a { color: #a5b4fc; text-decoration: none; }
    .wrap { padding: 25px 6%; max-width: 800px; margin: auto; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
    h2 { margin-top: 0; font-size: 18px; }
    input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    .btn { background: #2563eb; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    .btn-refresh { background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 10px; }
    .btn-danger { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
    .btn-del { background: #fee2e2; color: #dc2626; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .reply-box { display: flex; gap: 8px; margin-top: 15px; align-items: center; }
    .reply-box input { margin-bottom: 0; flex: 1; }
    .reply-box button { background: #10b981; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; height: 40px; }
    .reply-box label { background: #6b7280; color: white; padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; height: 40px; box-sizing: border-box; display: flex; align-items: center; }
    #adminPanel { display: none; }
  </style>
</head>
<body>

  <header>
    <b>HizmetBul Yönetim Paneli</b>
    <a href="index.html">Siteye Dön</a>
  </header>

  <!-- GİRİŞ EKRANI -->
  <div class="wrap" id="loginBox">
    <div class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
      <h2>Giriş Yap</h2>
      <input type="text" id="username" placeholder="Kullanıcı adı">
      <input type="password" id="password" placeholder="Şifre">
      <button class="btn" onclick="checkLogin()">Giriş Yap</button>
    </div>
  </div>

  <!-- YÖNETİM PANELİ -->
  <main class="wrap" id="adminPanel">
    
    <div class="card">
      <h2>📩 Canlı Destek Sohbetleri (Canlı Bildirim Aktif 🔔)</h2>
      <button class="btn-refresh" onclick="loadMessages()">🔄 Sohbeti Yenile</button>
      <button class="btn-danger" onclick="clearAllChat()">🗑️ Tüm Sohbetleri Temizle</button>
      
      <div id="chatThread" style="background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 15px; max-height: 400px; overflow-y: auto; margin-bottom: 15px;">
        Yükleniyor...
      </div>

      <div class="reply-box">
        <input type="file" id="adminImageInput" accept="image/*" style="display:none" onchange="sendAdminImage(event)">
        <label for="adminImageInput" title="Fotoğraf Gönder">📷</label>
        <input type="text" id="adminReplyInput" placeholder="En son mesaja yanıt yaz..." onkeypress="if(event.key === 'Enter') sendAdminReply()">
        <button onclick="sendAdminReply()">Yanıtla</button>
      </div>
    </div>

  </main>

  <script>
    let lastMessageCount = 0;

    function checkLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;

      if(u === 'ozan' && p === '123456') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadMessages();
        // Her 3 saniyede bir yeni mesaj var mı diye kontrol et ve ses çal
        setInterval(checkForNewMessages, 3000);
      } else {
        alert('Kullanıcı adı veya şifre hatalı!');
      }
    }

    function playNotificationSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5 nota
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch (e) {
        console.log('Ses çalınamadı');
      }
    }

    function checkForNewMessages() {
      let messages = JSON.parse(localStorage.getItem('hizmetbul_mesajlar') || '[]');
      if (messages.length > lastMessageCount) {
        if (lastMessageCount !== 0) {
          playNotificationSound();
        }
        lastMessageCount = messages.length;
        loadMessages();
      }
    }

    function loadMessages() {
      const thread = document.getElementById('chatThread');
      let messages = JSON.parse(localStorage.getItem('hizmetbul_mesajlar') || '[]');
      lastMessageCount = messages.length;
      
      thread.innerHTML = '';
      if (messages.length === 0) {
        thread.innerHTML = '<p style="color: #6b7280; text-align: center;">Henüz mesaj yok.</p>';
        return;
      }

      messages.forEach(item => {
        let contentHtml = item.text ? `<div>${item.text}</div>` : '';
        if(item.image) {
          contentHtml += `<img src="${item.image}" style="max-width: 150px; border-radius: 6px; margin-top: 4px; display: block;">`;
        }

        thread.innerHTML += `
          <div style="margin-bottom: 12px; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
              <span style="font-size: 12px; font-weight: bold; color: #2563eb;">👤 ${item.username || 'Misafir'} (${item.time || ''})</span>
              <button class="btn-del" onclick="deleteMessage(${item.id})">Sil</button>
            </div>
            <div style="background: #e5e7eb; display: inline-block; padding: 8px 12px; border-radius: 8px; text-align: left; max-width: 90%;">
              ${contentHtml}
            </div>
            ${item.reply ? `
              <div style="margin-top: 6px; text-align: left;">
                <span style="font-size: 11px; font-weight: bold; color: #10b981;">Sen (Admin):</span>
                <div style="background: #10b981; color: white; display: inline-block; padding: 6px 10px; border-radius: 8px; font-size: 14px;">${item.reply}</div>
              </div>` : ''}
          </div>
        `;
      });
      thread.scrollTop = thread.scrollHeight;
    }

    function sendAdminReply() {
      const input = document.getElementById('adminReplyInput');
      const text = input.value.trim();
      if(!text) return;

      let messages = JSON.parse(localStorage.getItem('hizmetbul_mesajlar') || '[]');
      if(messages.length === 0) {
        alert('Cevaplanacak mesaj yok.');
        return;
      }

      messages[messages.length - 1].reply = text;
      localStorage.setItem('hizmetbul_mesajlar', JSON.stringify(messages));
      input.value = '';
      loadMessages();
    }

    function sendAdminImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      let messages = JSON.parse(localStorage.getItem('hizmetbul_mesajlar') || '[]');
      if(messages.length === 0) {
        alert('Fotoğraf gönderecek aktif sohbet yok.');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        messages[messages.length - 1].reply = `📷 [Fotoğraf gönderildi]`;
        // İsterseniz yanıt alanına da resim eklenebilir veya ayrı tutulabilir
        localStorage.setItem('hizmetbul_mesajlar', JSON.stringify(messages));
        loadMessages();
      };
      reader.readAsDataURL(file);
    }

    function deleteMessage(id) {
      let messages = JSON.parse(localStorage.getItem('hizmetbul_mesajlar') || '[]');
      messages = messages.filter(m => m.id !== id);
      localStorage.setItem('hizmetbul_mesajlar', JSON.stringify(messages));
      loadMessages();
    }

    function clearAllChat() {
      if(confirm('Tüm sohbet geçmişini silmek istediğine emin misin?')) {
        localStorage.removeItem('hizmetbul_mesajlar');
        loadMessages();
      }
    }
  </script>

</body>
</html>

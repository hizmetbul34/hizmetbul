        <!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yönetim Paneli</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; color: #172033; }
    header { background: #111827; color: white; padding: 18px 6%; display: flex; justify-content: space-between; align-items: center; }
    header a { color: #a5b4fc; text-decoration: none; }
    .wrap { padding: 25px 6%; max-width: 800px; margin: auto; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
    h2 { margin-top: 0; font-size: 18px; }
    input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    .btn { background: #2563eb; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    .btn-refresh { background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 15px; }
    .msg-item { background: #f9fafb; border-left: 4px solid #007bff; padding: 12px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
    #adminPanel { display: none; }
  </style>
</head>
<body>

  <header>
    <b>HizmetBul Yönetim Paneli</b>
    <a href="index.html">Siteye Dön</a>
  </header>

  <!-- GİRİŞ EKRANI -->
  <div class="wrap" id="loginBox">
    <div class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
      <h2>Giriş Yap</h2>
      <input type="text" id="username" placeholder="Kullanıcı adı (ozan)">
      <input type="password" id="password" placeholder="Şifre (123456)">
      <button class="btn" onclick="checkLogin()">Giriş Yap</button>
    </div>
  </div>

  <!-- YÖNETİM PANELİ -->
  <main class="wrap" id="adminPanel">
    
    <!-- Gelen Mesajlar -->
    <div class="card">
      <h2>📩 Gelen Canlı Destek Mesajları</h2>
      <button class="btn-refresh" onclick="loadMessages()">🔄 Mesajları Yenile</button>
      <ul id="msgList" style="list-style: none; padding: 0; margin: 0;">
        <li>Yükleniyor...</li>
      </ul>
    </div>

    <!-- Hizmet Veren Ekle -->
    <div class="card">
      <h2>Hizmet Veren Ekle</h2>
      <input type="text" id="name" placeholder="İşletme / kişi adı">
      <input type="text" id="phone" placeholder="Telefon (905XXXXXXXXX)">
      <select id="category">
        <option value="">Kategori seç</option>
        <option>Oto Çekici & Yol Yardım</option>
        <option>Ev Temizliği</option>
        <option>Klima Servisi</option>
        <option>Özel Ders</option>
        <option>Tadilat</option>
        <option>Mezar Bakım & Temizlik</option>
        <option>İnşaat Kırım Döküm & Bahçe</option>
      </select>
      <select id="district">
        <option value="">İlçe seç</option>
        <option>Beykoz</option>
        <option>Kadıköy</option>
        <option>Beşiktaş</option>
        <option>Üsküdar</option>
      </select>
      <textarea id="desc" placeholder="Hizmet açıklaması" rows="3"></textarea>
      <button class="btn" onclick="addProvider()">Hizmet Veren Ekle</button>
    </div>

  </main>

  <script>
    function checkLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;

      if(u === 'ozan' && p === '123456') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadMessages();
      } else {
        alert('Kullanıcı adı veya şifre hatalı!');
      }
    }

    function loadMessages() {
      const list = document.getElementById('msgList');
      const messages = JSON.parse(localStorage.getItem('hizmetbul_mesajlar') || '[]');
      
      list.innerHTML = '';
      if (messages.length === 0) {
        list.innerHTML = '<li>Henüz gelen mesaj yok.</li>';
        return;
      }

      messages.reverse().forEach(item => {
        list.innerHTML += `
          <li class="msg-item">
            <span style="font-size: 15px;">${item.text}</span>
            <span style="font-size: 12px; color: #6b7280; font-weight: bold;">🕒 ${item.time || ''}</span>
          </li>
        `;
      });
    }

    function addProvider() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const category = document.getElementById('category').value;
      const district = document.getElementById('district').value;
      const desc = document.getElementById('desc').value;

      if(!name) {
        alert('Lütfen işletme adı girin.');
        return;
      }

      fetch('https://api.restful-api.dev/objects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: "hizmetbul34_isletme",
          data: { name, phone, category, district, desc }
        })
      }).then(() => {
        alert('Hizmet veren eklendi!');
        document.getElementById('name').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('desc').value = '';
      });
    }
  </script>

</body>
</html>

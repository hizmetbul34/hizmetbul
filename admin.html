<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yönetim Paneli</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; color: #172033; }
    header { background: #111827; color: white; padding: 18px 6%; display: flex; justify-content: space-between; align-items: center; }
    header a { color: #a5b4fc; text-decoration: none; }
    .wrap { padding: 25px 6%; max-width: 800px; margin: auto; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
    h2 { margin-top: 0; font-size: 18px; }
    input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    .btn { background: #2563eb; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    .btn-refresh { background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 10px; }
    .btn-danger { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
    .btn-del { background: #fee2e2; color: #dc2626; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .user-chat-box { background: #fafafa; border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
    .reply-box { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
    .reply-box input { margin-bottom: 0; flex: 1; }
    .reply-box button { background: #10b981; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; height: 40px; white-space: nowrap; }
    #adminPanel { display: none; }
  </style>
</head>
<body>

  <header>
    <b>HizmetBul Yönetim Paneli</b>
    <a href="index.html">Siteye Dön</a>
  </header>

  <!-- GİRİŞ EKRANI -->
  <div class="wrap" id="loginBox">
    <div class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
      <h2>Giriş Yap</h2>
      <input type="text" id="username" placeholder="Kullanıcı adı">
      <input type="password" id="password" placeholder="Şifre">
      <button class="btn" onclick="checkLogin()">Giriş Yap</button>
    </div>
  </div>

  <!-- YÖNETİM PANELİ -->
  <main class="wrap" id="adminPanel">
    
    <div class="card">
      <h2>📩 Müşteri Sohbetleri (Kullanıcı Bazlı 🔔)</h2>
      <button class="btn-refresh" onclick="loadMessages()">🔄 Yenile</button>
      <button class="btn-danger" onclick="clearAllChat()">🗑️ Tüm Sohbetleri Temizle</button>
      
      <div id="chatContainer">
        Yükleniyor...
      </div>
    </div>

  </main>

  <script>
    let lastMessageCount = 0;

    function checkLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;

      if(u === 'ozan' && p === '123456') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadMessages();
        setInterval(checkForNewMessages, 3000);
      } else {
        alert('Kullanıcı adı veya şifre hatalı!');
      }
    }

    function playNotificationSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(587.33, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch (e) {}
    }

    function checkForNewMessages() {
      let messages = JSON.parse(localStorage.getItem('hizmetbul_mesajlar') || '[]');
      if (messages.length > lastMessageCount) {
        if (lastMessageCount !== 0) playNotificationSound();
        lastMessageCount = messages.length;
        loadMessages();
      }
    }

    function loadMessages() {
      const container = document.getElementById('chatContainer');
      let messages = JSON.parse(localStorage.getItem('hizmetbul_mesajlar') || '[]');
      lastMessageCount = messages.length;
      
      container.innerHTML = '';
      if (messages.length === 0) {
        container.innerHTML = '<p style="color: #6b7280; text-align: center;">Henüz mesaj yok.</p>';
        return;
      }

      // Kullanıcılara göre grupla
      let userGroups = {};
      messages.forEach(item => {
        let uname = item.username || 'Misafir';
        if (!userGroups[uname]) userGroups[uname] = [];
        userGroups[uname].push(item);
      });

      for (let uname in userGroups) {
        let userMsgs = userGroups[uname];
        let htmlMsgs = '';

        userMsgs.forEach(m => {
          let contentHtml = m.text ? `<div>${m.text}</div>` : '';
          if(m.image) {
            contentHtml += `<img src="${m.image}" style="max-width: 150px; border-radius: 6px; margin-top: 4px; display: block;">`;
          }

          htmlMsgs += `
            <div style="margin-bottom: 8px; display: flex; justify-content: space-between; align-items: flex-start;">
              <div style="background: #e5e7eb; padding: 8px 12px; border-radius: 8px; max-width: 80%;">
                <div style="font-size: 11px; color: #4b5563; margin-bottom: 2px;">${m.time || ''}</div>
                ${contentHtml}
              </div>
              <button class="btn-del" onclick="deleteMessage(${m.id})">Sil</button>
            </div>
          `;

          if(m.reply && m.reply.trim() !== '') {
            htmlMsgs += `
              <div style="margin-bottom: 8px; text-align: right;">
                <div style="background: #10b981; color: white; padding: 8px 12px; border-radius: 8px; display: inline-block; max-width: 80%; text-align: left; font-size: 14px;">
                  <div style="font-size: 11px; opacity: 0.8; margin-bottom: 2px;">Sen (Admin)</div>
                  ${m.reply}
                </div>
              </div>
            `;
          }
        });

        container.innerHTML += `
          <div class="user-chat-box">
            <div style="font-weight: bold; color: #2563eb; margin-bottom: 10px; font-size: 16px; border-bottom: 1px solid #ddd; padding-bottom: 5px;">
              👤 ${uname} (${userMsgs.length} mesaj)
            </div>
            <div style="max-height: 250px; overflow-y: auto; margin-bottom: 10px;">
              ${htmlMsgs}
            </div>
            <div class="reply-box">
              <input type="text" id="reply_${uname}" placeholder="${uname} adlı kullanıcıya yanıt yaz..." onkeypress="if(event.key === 'Enter') sendUserReply('${uname}')">
              <button onclick="sendUserReply('${uname}')">Yanıtla</button>
            </div>
          </div>
        `;
      }
    }

    function sendUserReply(uname) {
      const input = document.getElementById(`reply_${uname}`);
      const text = input.value.trim();
      if(!text) return;

      let messages = JSON.parse(localStorage.getItem('hizmetbul_mesajlar') || '[]');
      let userMsgs = messages.filter(m => (m.username || 'Misafir') === uname);
      if(userMsgs.length > 0) {
        let lastMsgOfUser = userMsgs[userMsgs.length - 1];
        let index = messages.findIndex(m => m.id === lastMsgOfUser.id);
        if(index !== -1) {
          messages[index].reply = text;
          localStorage.setItem('hizmetbul_mesajlar', JSON.stringify(messages));
          input.value = '';
          loadMessages();
        }
      }
    }

    function deleteMessage(id) {
      let messages = JSON.parse(localStorage.getItem('hizmetbul_mesajlar') || '[]');
      messages = messages.filter(m => m.id !== id);
      localStorage.setItem('hizmetbul_mesajlar', JSON.stringify(messages));
      loadMessages();
    }

    function clearAllChat() {
      if(confirm('Tüm sohbet geçmişini silmek istediğine emin misin?')) {
        localStorage.removeItem('hizmetbul_mesajlar');
        loadMessages();
      }
    }
  </script>

</body>
</html>
